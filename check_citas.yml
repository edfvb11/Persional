name: Monitor cita embajada Japon

on:
  schedule:
    - cron: '*/10 * * * *'   # cada 10 minutos
  workflow_dispatch:          # permite correrlo manualmente desde la pestaña Actions

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Revisar calendario
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: python check_citas.py

      - name: Guardar estado
        run: |
          git config user.name "cita-bot"
          git config user.email "cita-bot@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "Actualizar estado del calendario"
          git push
