name: Monitor cita embajada Japon

on:
  schedule:
    - cron: '*/10 * * * *'   # cada 10 minutos
  workflow_dispatch:          # permite correrlo manualmente desde la pestaña Actions

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Revisar calendario
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: python check_citas.py

      - name: Guardar estado
        run: |
          git config user.name "cita-bot"
          git config user.email "cita-bot@users.noreply.github.com"
          git add state.json

          # Si no hay cambios, salir
          if git diff --staged --quiet; then
            echo "No hay cambios para commitear"
            exit 0
          fi

          # Asegurar que la rama local esté sincronizada con el remoto
          git fetch origin main
          # Intentar rebase con autostash para integrar cambios remotos
          git rebase origin/main --autostash || git pull --rebase origin main

          git commit -m "Actualizar estado del calendario"

          # Empujar usando las credenciales persistentes
          git push origin HEAD:main
